name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install ruff==0.4.7 pytest==8.2.2

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v
